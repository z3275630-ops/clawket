name: Build Pro-Unlocked APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Setup mobile node_modules (postinstall)
        run: node scripts/setup-mobile-node-modules.mjs || true
        continue-on-error: true

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Build Office Game assets
        working-directory: apps/mobile/office-game
        run: npm install && npm run build

      - name: Generate Android project (prebuild)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Build Pro-Unlocked APK
        working-directory: apps/mobile/android
        env:
          EXPO_PUBLIC_UNLOCK_PRO: 'true'
        run: |
          ./gradlew --no-daemon \
            app:assembleRelease \
            -x lint -x test \
            --configure-on-demand --build-cache \
            -Pclawket.allowDebugReleaseSigning=true \
            -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clawket-pro-unlocked
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
